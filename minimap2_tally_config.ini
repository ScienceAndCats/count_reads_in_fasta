[paths]
# Folder containing your FASTQ files
fastq_dir = /path/to/fastq_folder

# Folder containing your FASTA files
fasta_dir = /path/to/fasta_folder

# Output CSV file
out_csv = minimap2_tally.csv

# Folder where minimap2 .mmi index files will be stored
index_dir = minimap2_indexes

[settings]
# Use auto to choose sr for short reads (median read length <= 500)
# and map-ont or map-pb for longer reads.
preset = auto

# Used only when preset = auto and the reads are long.
# Choices: map-ont or map-pb
long_read_preset = map-ont

# Search subfolders too? true or false
recursive = false

# Number of CPU threads for minimap2
threads = 4

# Maximum allowed edit fraction among aligned query bases.
# This is based on minimap2's NM tag, so it includes mismatches + indels.
# Example: 0.10 means up to 10% edits in the aligned part of the read.
max_edit_fraction = 0.10

# Minimum fraction of the read that must be aligned.
# Example: 0.80 means at least 80% of the read must align.
min_query_covered = 0.00

# Minimum MAPQ score to count an alignment.
min_mapq = 0

# Number of reads sampled to estimate median read length for auto preset selection
sample_reads_for_length = 1000

# Optional extra minimap2 arguments, written exactly as you would type them.
# Leave blank if you do not want any.
# Example: -k 15 -w 10
extra_mm2_args =
